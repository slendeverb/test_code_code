<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>

    <style type="text/css">
        body,
        ul {
            margin: 0;
            padding: 0;
            color: #666;
            font-size: 16px;
        }

        ul {
            list-style: none;
        }

        a {
            text-decoration: none;
            color: #666;
        }

        .header {
            /* background-color: rgba(7, 17, 27, 0.1); */
            width: 1280px;
            height: 48px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
        }

        .header .left {
            display: flex;
            margin-left: 8px;
        }

        .header .left .logo-wrap {
            height: 48px;
        }

        .header .left .logo-wrap>a {
            display: block;
            height: 48px;
        }

        .header .left .logo-wrap>a>img {
            height: 48px;
        }

        .header .left .nav-wrap {
            height: 48px;
            margin-left: 12px;
        }

        .header .left .nav-wrap>ul {
            display: flex;
            height: 48px;
        }

        .header .left .nav-wrap>ul>li {
            height: 48px;
            line-height: 48px;
        }

        .header .left .nav-wrap>ul>li:hover {
            background-color: rgb(240, 240, 245);
        }

        .header .left .nav-wrap>ul>li>a {
            display: block;
            height: 48px;
            line-height: 48px;
            padding: 0 12px;
        }

        .header .right {
            display: flex;
            align-items: center;
            margin-right: 8px;
            height: 40px;
        }

        .header .right .btn-wrap {
            height: 36px;
            line-height: 36px;
            background-color: rgb(252, 85, 49);
            width: 90px;
            text-align: center;
            text-indent: 20px;
            /* user-select: none; */
            border-radius: 36px;
            background-image: url('https://g.csdnimg.cn/common/csdn-toolbar/images/icon-write.png');
            background-repeat: no-repeat;
            background-position: 12px center;
            background-size: 18px;
        }

        .header .right .btn-wrap>a {
            color: white;
            font-weight: 500;
            font-size: 17px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="left">
            <div class="logo-wrap">
                <a href="https://www.csdn.net/?spm=1000.2115.3001.4476">
                    <img src="https://img-home.csdnimg.cn/images/20201124032511.png">
                </a>
            </div>
            <div class="nav-wrap">
                <ul>
                    <li>
                        <a href="https://blog.csdn.net/?spm=1000.2115.3001.4477">博客</a>
                    </li>
                    <li>
                        <a href="https://download.csdn.net/?spm=1000.2115.3001.6907">下载</a>
                    </li>
                    <li>
                        <a href="https://edu.csdn.net/?spm=1000.2115.3001.4482">学习</a>
                    </li>
                    <li>
                        <a href="https://bbs.csdn.net/?spm=1000.2115.3001.6068">社区</a>
                    </li>
                    <li>
                        <a href="https://plugin.csdn.net/?spm=1000.2115.3001.9626">插件</a>
                    </li>
                    <li>
                        <a href="https://gitcode.com/?utm_source=csdn_toolbar&spm=1000.2115.3001.6768">GitCode</a>
                    </li>
                    <li>
                        <a href="https://inscode.csdn.net/?utm_source=260232576&spm=1000.2115.3001.8290">InsCode</a>
                    </li>
                </ul>
            </div>
        </div>
        <div class="right">
            <div class="btn-wrap">
                <a href="https://mp.csdn.net/edit?spm=1000.2115.3001.4503">发布</a>
            </div>
        </div>
    </div>
</body>

</html>
