<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>管理后台</title>
<link href="/css/font-awesome/css/font-awesome.min.css" rel="stylesheet" >
<style>
    
    *{
        padding: 0px;
        margin: 0px;
        box-sizing: border-box;
    }
    html, body{
        height: 100%;
    }

    body{
        background: white;
        font-size: 13px;
        font-family: 'Microsoft YaHei', 'Arial', 'sans-serif';
        position: relative;
        display: flex;
        flex-direction: column;
    }

    #menu{
        
        width: 498px;
        border-radius: 0px 0px 2px 2px;
        padding: 8px;
        position: absolute;
        background-size:auto 24px;
        color: white;
        font-size: 14px;
        font-weight: 100;
        text-align: center;
        bottom: 0px;
        left: 50%;
        margin-left: -249px;
    }

    #head{
        
        background: url(/img/bg.fw.png) no-repeat center center;
        background-size: cover;
        flex-basis: 168px;
        position: relative;;
    }

    #logo{
        background: url('/img/logo.fw.png') no-repeat center center;
        height: 48px;
        background-size: contain;
        position: relative;

    }
    .login-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 498px;
            margin: 0 auto;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }

        .form-group input[type="submit"] {
            background-color: #5cb85c;
            color: white;
            cursor: pointer;
        }

        .form-group input[type="submit"]:hover {
            background-color: #4cae4c;
        }
</style>

</head>
<body>
    <div id="head">
       
    </div>
    <div  id="container">
        <div class="login-container">
            
            
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <input type="submit" value="登录" id="loginBut"/>
                </div>
            
            <div style="color: #555; text-align: center; margin: 16px 0px;"> @Copyright 2024</div>
        </div>
        
    </div>
    <script src="/js/require.js" data-main="/js/require.config"  id="current-page" current-page ="login" target-module="login" defer async="true" ></script>
    
</body>
</html>
